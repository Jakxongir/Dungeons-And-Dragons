<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeons-And-Dragons</title>
    <style>
        :root {
            --primary: #ffd700;
            --danger: #ff4444;
            --success: #00c851;
            --info: #33b5e5;
            --dark: #1a0b2e;
            --panel: rgba(20, 10, 40, 0.9);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            color: white;
            overflow-x: hidden;
            background: linear-gradient(-45deg, #ff9a3c, #ff5e62, #ff7eb9, #c471ed, #a259ff, #ff9a3c);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* UI Components */
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .resources {
            display: flex;
            gap: 15px;
        }

        .res-item {
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: var(--panel);
            border: 2px solid var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .tab-btn:hover, .tab-btn.active {
            background: var(--primary);
            color: var(--dark);
            transform: translateY(-2px);
            box-shadow: 0 0 15px var(--primary);
        }

        .content-area {
            background: var(--panel);
            border-radius: 20px;
            padding: 20px;
            min-height: 400px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Fighters Grid */
        .fighters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .fighter-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
        }

        .fighter-card:hover {
            transform: scale(1.02);
            border-color: var(--primary);
        }

        .fighter-card.selected {
            border: 2px solid var(--success);
            box-shadow: 0 0 20px rgba(0, 200, 81, 0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .class-badge {
            background: var(--info);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            font-size: 0.9rem;
            margin: 10px 0;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            padding: 3px 5px;
            border-radius: 4px;
        }

        .action-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .btn-select { background: var(--primary); color: var(--dark); }
        .btn-battle { 
            background: var(--danger); 
            color: white; 
            font-size: 1.2rem; 
            padding: 15px; 
            margin-top: 20px;
            box-shadow: 0 4px 0 #b30000;
        }
        .btn-battle:active { transform: translateY(4px); box-shadow: none; }
        .btn-battle:disabled { background: #555; box-shadow: none; cursor: not-allowed; }

        /* Shop & Quests */
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
        }

        .quest-reward { color: var(--primary); font-weight: bold; }
        
        /* Battle Screen */
        #battle-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .battle-arena {
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        .combatants {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 40px 0;
        }

        .combatant {
            width: 150px;
            text-align: center;
        }

        .health-bar-container {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
            border: 2px solid white;
        }

        .health-bar {
            height: 100%;
            background: var(--success);
            width: 100%;
            transition: width 0.5s ease-out;
        }

        .battle-log {
            height: 150px;
            overflow-y: auto;
            background: rgba(0,0,0,0.5);
            border: 1px solid #444;
            padding: 10px;
            margin-bottom: 20px;
            text-align: left;
            font-family: monospace;
            border-radius: 5px;
        }

        .log-entry { margin-bottom: 5px; }
        .log-player { color: #4fc3f7; }
        .log-enemy { color: #ff8a80; }
        .log-sys { color: #ffd700; }

        /* Drawing Canvas */
        .canvas-container {
            text-align: center;
        }
        canvas {
            background: white;
            border-radius: 10px;
            cursor: crosshair;
            touch-action: none;
        }
        .color-picker {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 10px 0;
        }
        .color-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid white;
            cursor: pointer;
        }
        .color-btn.active { transform: scale(1.2); border-color: var(--primary); }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transform: translateX(200%);
            transition: transform 0.3s;
            z-index: 1000;
        }
        .notification.show { transform: translateX(0); }
    </style>
</head>
<body>

<div class="notification" id="notification">Сообщение</div>

<!-- Battle Overlay -->
<div id="battle-screen">
    <div class="battle-arena">
        <h2 style="color: var(--danger); text-transform: uppercase; letter-spacing: 3px;">Битва!</h2>
        
        <div class="combatants">
            <div class="combatant" id="player-combatant">
                <div id="battle-player-name" style="font-weight:bold; margin-bottom:5px;">Игрок</div>
                <div class="health-bar-container">
                    <div class="health-bar" id="player-hp-bar"></div>
                </div>
                <div id="player-hp-text">100/100</div>
                <div style="font-size: 3rem; margin: 10px 0;">🦸</div>
            </div>
            
            <div style="font-size: 2rem; font-weight: bold;">VS</div>
            
            <div class="combatant" id="enemy-combatant">
                <div id="battle-enemy-name" style="font-weight:bold; margin-bottom:5px; color: #ff8a80;">Монстр</div>
                <div class="health-bar-container">
                    <div class="health-bar" id="enemy-hp-bar" style="background: var(--danger);"></div>
                </div>
                <div id="enemy-hp-text">100/100</div>
                <div style="font-size: 3rem; margin: 10px 0;">👹</div>
            </div>
        </div>

        <div class="battle-log" id="battle-log"></div>

        <div id="battle-controls">
            <button class="action-btn btn-battle" style="width: 200px;" onclick="battleAttack()">⚔️ АТАКА</button>
            <button class="action-btn" style="background: #444; color: white; width: 200px; margin-top: 10px;" onclick="endBattle(true)">🏳️ Сдаться</button>
        </div>
        <div id="battle-end-controls" style="display:none;">
            <button class="action-btn btn-battle" style="width: 200px;" onclick="endBattle(false)">🏠 В меню</button>
        </div>
    </div>
</div>

<div class="app-container">
    <!-- Header -->
    <div class="header">
        <div class="logo">Dungeons-And-Dragons</div>
        <div class="resources">
            <div class="res-item">💰 <span id="gold-display">0</span></div>
            <div class="res-item">💎 <span id="gems-display">0</span></div>
            <div class="res-item">🏆 <span id="rating-display">0</span></div>
        </div>
    </div>

    <!-- Navigation -->
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('heroes')">Герои</button>
        <button class="tab-btn" onclick="switchTab('create')">Создать (ИИ/Рис)</button>
        <button class="tab-btn" onclick="switchTab('shop')">Магазин</button>
        <button class="tab-btn" onclick="switchTab('quests')">Задания</button>
    </div>

    <!-- Content -->
    <div class="content-area">
        
        <!-- Heroes Tab -->
        <div id="heroes" class="tab-content active">
            <h3>Ваши Герои</h3>
            <p style="color: #aaa; font-size: 0.9rem;">Выберите героя для входа в бой</p>
            <div class="fighters-grid" id="heroes-list"></div>
            <button id="start-battle-btn" class="action-btn btn-battle" disabled onclick="startGame()">⚔️ В БОЙ!</button>
        </div>

        <!-- Create Tab -->
        <div id="create" class="tab-content">
            <div class="nav-tabs" style="margin-bottom: 10px;">
                <button class="tab-btn active" onclick="setCreateMode('ai')">🤖 ИИ Генератор</button>
                <button class="tab-btn" onclick="setCreateMode('draw')">🎨 Рисование</button>
            </div>

            <!-- AI Mode -->
            <div id="ai-mode">
                <div style="text-align: center; padding: 20px;">
                    <p>ИИ создаст уникального героя со сбалансированными характеристиками.</p>
                    <button class="action-btn btn-select" style="width: 200px;" onclick="generateAIHero()">✨ Создать Героя</button>
                </div>
            </div>

            <!-- Draw Mode -->
            <div id="draw-mode" style="display: none;">
                <div class="canvas-container">
                    <canvas id="drawCanvas" width="300" height="300"></canvas>
                    <div class="color-picker">
                        <div class="color-btn active" style="background: black;" onclick="setColor('black')"></div>
                        <div class="color-btn" style="background: red;" onclick="setColor('red')"></div>
                        <div class="color-btn" style="background: blue;" onclick="setColor('blue')"></div>
                        <div class="color-btn" style="background: green;" onclick="setColor('green')"></div>
                        <div class="color-btn" style="background: yellow;" onclick="setColor('yellow')"></div>
                        <div class="color-btn" style="background: white;" onclick="setColor('white')"></div>
                    </div>
                    <button class="action-btn" style="width: 150px; background: #444; color: white;" onclick="clearCanvas()">Очистить</button>
                    <button class="action-btn btn-select" style="width: 150px;" onclick="saveDrawing()">💾 Сохранить</button>
                </div>
            </div>
        </div>

        <!-- Shop Tab -->
        <div id="shop" class="tab-content">
            <h3>Магазин Улучшений</h3>
            <div id="shop-list">
                <!-- Items injected by JS -->
            </div>
        </div>

        <!-- Quests Tab -->
        <div id="quests" class="tab-content">
            <h3>Ежедневные Задания</h3>
            <div id="quests-list">
                <!-- Quests injected by JS -->
            </div>
        </div>
    </div>
</div>

<script>
    // --- State Management ---
    const defaultState = {
        gold: 0,
        gems: 0,
        rating: 0,
        heroes: [],
        quests: [
            { id: 1, text: "Провести 1 битву", reward: 50, completed: false, claimed: false },
            { id: 2, text: "Создать 1 героя", reward: 30, completed: false, claimed: false },
            { id: 3, text: "Накопить 100 золота", reward: 100, completed: false, claimed: false }
        ],
        shopItems: [
            { id: 1, name: "Зелье Силы (+5)", cost: 50, type: 'str', val: 5 },
            { id: 2, name: "Свиток Скорости (+5)", cost: 50, type: 'spd', val: 5 },
            { id: 3, name: "Кристалл Магии (+5)", cost: 50, type: 'mag', val: 5 }
        ]
    };

    let state = JSON.parse(localStorage.getItem('dad_game_state')) || JSON.parse(JSON.stringify(defaultState));
    
    // Ensure new fields exist if loading old save
    if (!state.gold) state.gold = 0;
    if (!state.gems) state.gems = 0;
    if (!state.rating) state.rating = 0;
    if (!state.shopItems) state.shopItems = defaultState.shopItems;
    
    let selectedHeroId = null;
    let currentBattle = null;

    // --- Initialization ---
    function init() {
        updateUI();
        renderHeroes();
        renderShop();
        renderQuests();
        setupCanvas();
    }

    function saveState() {
        localStorage.setItem('dad_game_state', JSON.stringify(state));
        updateUI();
    }

    function showNotification(msg) {
        const el = document.getElementById('notification');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 3000);
    }

    function updateUI() {
        document.getElementById('gold-display').textContent = state.gold;
        document.getElementById('gems-display').textContent = state.gems;
        document.getElementById('rating-display').textContent = state.rating;
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
        
        if (tabId === 'heroes') renderHeroes();
        if (tabId === 'shop') renderShop();
        if (tabId === 'quests') renderQuests();
    }

    // --- Hero Logic ---
    const CLASSES = [
        { name: 'Танк', base: { str: 80, spd: 40, mag: 30, exp: 50 } },
        { name: 'Воин', base: { str: 70, spd: 60, mag: 40, exp: 60 } },
        { name: 'Маг', base: { str: 30, spd: 50, mag: 90, exp: 70 } },
        { name: 'Убийца', base: { str: 60, spd: 90, mag: 40, exp: 50 } },
        { name: 'Лучник', base: { str: 50, spd: 80, mag: 60, exp: 60 } },
        { name: 'Жрец', base: { str: 40, spd: 50, mag: 80, exp: 80 } }
    ];

    const NAMES_PREFIX = ['Темный', 'Светлый', 'Дикий', 'Древний', 'Храбрый', 'Таинственный'];
    const NAMES_ROOT = ['Воин', 'Странник', 'Хранитель', 'Охотник', 'Маг', 'Рыцарь'];

    function generateName() {
        return `${NAMES_PREFIX[Math.floor(Math.random()*NAMES_PREFIX.length)]} ${NAMES_ROOT[Math.floor(Math.random()*NAMES_ROOT.length)]}`;
    }

    function createHero(source, customData = null) {
        const cls = CLASSES[Math.floor(Math.random() * CLASSES.length)];
        let stats = { ...cls.base };
        let name = generateName();
        let isCustom = false;

        // AI Balancing Logic
        if (source === 'ai') {
            // Add some randomness but keep class identity
            Object.keys(stats).forEach(k => {
                stats[k] = Math.min(100, Math.max(10, stats[k] + Math.floor(Math.random() * 20) - 10));
            });
        } 
        else if (source === 'draw') {
            isCustom = true;
            name = customData.name || "Нарисованный Герой";
            // Debuff logic for custom drawn heroes to prevent OP stats
            // Base stats are lower, cap is lower
            stats = { str: 50, spd: 50, mag: 50, exp: 50 };
            const randClass = CLASSES[Math.floor(Math.random() * CLASSES.length)];
            // Apply slight class bias but keep total power lower than AI
            stats.str = Math.floor(randClass.base.str * 0.7);
            stats.spd = Math.floor(randClass.base.spd * 0.7);
            stats.mag = Math.floor(randClass.base.mag * 0.7);
            stats.exp = Math.floor(randClass.base.exp * 0.7);
            
            // Random Debuff: One stat is significantly reduced
            const debuffStat = Object.keys(stats)[Math.floor(Math.random()*4)];
            stats[debuffStat] = Math.floor(stats[debuffStat] * 0.5);
        }

        const hero = {
            id: Date.now(),
            name: name,
            class: cls.name,
            stats: stats,
            image: customData ? customData.image : null,
            source: source
        };

        state.heroes.push(hero);
        saveState();
        renderHeroes();
        showNotification(`Герой ${hero.name} создан!`);
        
        // Complete quest if needed
        checkQuestProgress('create_hero');
    }

    function generateAIHero() {
        createHero('ai');
    }

    function renderHeroes() {
        const container = document.getElementById('heroes-list');
        container.innerHTML = '';
        
        if (state.heroes.length === 0) {
            container.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">У вас нет героев. Создайте первого!</p>';
            document.getElementById('start-battle-btn').disabled = true;
            return;
        }

        state.heroes.forEach(hero => {
            const card = document.createElement('div');
            card.className = `fighter-card ${selectedHeroId === hero.id ? 'selected' : ''}`;
            card.onclick = () => selectHero(hero.id);
            
            let imgHTML = hero.image 
                ? `<img src="${hero.image}" style="width:100%; height:150px; object-fit:cover; border-radius:10px; margin-bottom:10px;">`
                : `<div style="height:150px; background:rgba(0,0,0,0.3); border-radius:10px; margin-bottom:10px; display:flex; align-items:center; justify-content:center; font-size:3rem;">🛡️</div>`;

            card.innerHTML = `
                ${imgHTML}
                <div class="card-header">
                    <strong>${hero.name}</strong>
                    <span class="class-badge">${hero.class}</span>
                </div>
                <div class="stats-grid">
                    <div class="stat-row"><span>⚔️ Сила</span><span>${hero.stats.str}</span></div>
                    <div class="stat-row"><span>⚡ Скор</span><span>${hero.stats.spd}</span></div>
                    <div class="stat-row"><span>🔮 Магия</span><span>${hero.stats.mag}</span></div>
                    <div class="stat-row"><span>⭐ Опыт</span><span>${hero.stats.exp}</span></div>
                </div>
                ${selectedHeroId === hero.id ? '<button class="action-btn" style="background:var(--success); color:white;">Выбран</button>' : '<button class="action-btn btn-select">Выбрать</button>'}
            `;
            container.appendChild(card);
        });

        document.getElementById('start-battle-btn').disabled = !selectedHeroId;
    }

    function selectHero(id) {
        selectedHeroId = id;
        renderHeroes();
    }

    // --- Drawing Logic ---
    let canvas, ctx, isDrawing = false;
    let drawColor = 'black';

    function setCreateMode(mode) {
        document.getElementById('ai-mode').style.display = mode === 'ai' ? 'block' : 'none';
        document.getElementById('draw-mode').style.display = mode === 'draw' ? 'block' : 'none';
        
        const btns = document.querySelectorAll('#create .tab-btn');
        btns.forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    function setupCanvas() {
        canvas = document.getElementById('drawCanvas');
        ctx = canvas.getContext('2d');
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';

        // Mouse events
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseout', stopDraw);
        
        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousedown', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousemove', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        });
        canvas.addEventListener('touchend', () => {
            const mouseEvent = new MouseEvent('mouseup', {});
            canvas.dispatchEvent(mouseEvent);
        });
    }

    function startDraw(e) {
        isDrawing = true;
        ctx.beginPath();
        ctx.moveTo(e.clientX - canvas.getBoundingClientRect().left, e.clientY - canvas.getBoundingClientRect().top);
    }

    function draw(e) {
        if (!isDrawing) return;
        ctx.lineTo(e.clientX - canvas.getBoundingClientRect().left, e.clientY - canvas.getBoundingClientRect().top);
        ctx.stroke();
    }

    function stopDraw() {
        isDrawing = false;
    }

    function setColor(color) {
        drawColor = color;
        ctx.strokeStyle = color;
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    function clearCanvas() {
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function saveDrawing() {
        const dataURL = canvas.toDataURL();
        const name = prompt("Введите имя героя:", generateName());
        if (name) {
            createHero('draw', { image: dataURL, name: name });
            clearCanvas();
            switchTab('heroes');
        }
    }

    // --- Shop Logic ---
    function renderShop() {
        const container = document.getElementById('shop-list');
        container.innerHTML = '';
        
        state.shopItems.forEach(item => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <div>
                    <div style="font-weight:bold; color:var(--primary)">${item.name}</div>
                    <div style="font-size:0.8rem; color:#aaa">Увеличивает характеристику навсегда</div>
                </div>
                <button class="action-btn" style="width:100px; background:${state.gold >= item.cost ? 'var(--success)' : '#555'}" 
                    onclick="buyItem(${item.id})" ${state.gold < item.cost ? 'disabled' : ''}>
                    ${item.cost} 💰
                </button>
            `;
            container.appendChild(div);
        });
    }

    function buyItem(id) {
        const item = state.shopItems.find(i => i.id === id);
        if (!item || state.gold < item.cost) return;

        if (!selectedHeroId) {
            showNotification("Сначала выберите героя!");
            switchTab('heroes');
            return;
        }

        const hero = state.heroes.find(h => h.id === selectedHeroId);
        if (!hero) return;

        state.gold -= item.cost;
        
        if (item.type === 'str') hero.stats.str += item.val;
        if (item.type === 'spd') hero.stats.spd += item.val;
        if (item.type === 'mag') hero.stats.mag += item.val;

        saveState();
        renderShop();
        renderHeroes();
        showNotification(`Куплено: ${item.name}`);
    }

    // --- Quests Logic ---
    function renderQuests() {
        const container = document.getElementById('quests-list');
        container.innerHTML = '';
        
        let hasActive = false;
        state.quests.forEach(q => {
            if (q.claimed) return;
            hasActive = true;
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <div>
                    <div>${q.text}</div>
                    <div class="quest-reward">Награда: ${q.reward} 💰</div>
                </div>
                <button class="action-btn" style="width:100px;" 
                    onclick="claimQuest(${q.id})" ${!q.completed ? 'disabled' : ''}>
                    ${q.completed ? 'Забрать' : 'В прогрессе'}
                </button>
            `;
            container.appendChild(div);
        });

        if (!hasActive) {
            container.innerHTML = '<p>Все задания выполнены! Заходите завтра.</p>';
        }
    }

    function checkQuestProgress(type) {
        let updated = false;
        if (type === 'battle') {
            const q = state.quests.find(x => x.text.includes("битву"));
            if (q && !q.completed) { q.completed = true; updated = true; }
        }
        if (type === 'create_hero') {
            const q = state.quests.find(x => x.text.includes("героя"));
            if (q && !q.completed) { q.completed = true; updated = true; }
        }
        if (type === 'gold_check') {
            const q = state.quests.find(x => x.text.includes("золота"));
            if (q && !q.completed && state.gold >= 100) { q.completed = true; updated = true; }
        }

        if (updated) {
            saveState();
            if (document.getElementById('quests').classList.contains('active')) renderQuests();
        }
    }

    function claimQuest(id) {
        const q = state.quests.find(x => x.id === id);
        if (!q || !q.completed || q.claimed) return;

        state.gold += q.reward;
        q.claimed = true;
        saveState();
        renderQuests();
        showNotification(`Получено ${q.reward} золота!`);
    }

    // --- Battle System ---
    function startGame() {
        if (!selectedHeroId) return;
        const hero = state.heroes.find(h => h.id === selectedHeroId);
        
        // Generate Enemy
        const enemyPower = Math.floor((hero.stats.str + hero.stats.spd + hero.stats.mag) / 3);
        const enemy = {
            name: ['Гоблин', 'Орк', 'Скелет', 'Дракончик', 'Тролль'][Math.floor(Math.random()*5)],
            maxHp: enemyPower * 3,
            hp: enemyPower * 3,
            dmg: Math.floor(enemyPower * 0.8)
        };

        currentBattle = {
            player: {
                name: hero.name,
                maxHp: (hero.stats.str + hero.stats.exp) * 2,
                hp: (hero.stats.str + hero.stats.exp) * 2,
                dmg: Math.floor(hero.stats.str * 1.5),
                speed: hero.stats.spd
            },
            enemy: enemy,
            turn: 0
        };

        // Setup UI
        document.getElementById('battle-screen').style.display = 'flex';
        document.getElementById('battle-player-name').textContent = currentBattle.player.name;
        document.getElementById('battle-enemy-name').textContent = currentBattle.enemy.name;
        document.getElementById('battle-log').innerHTML = '<div class="log-sys">Битва началась!</div>';
        
        updateBattleUI();
        document.getElementById('battle-controls').style.display = 'block';
        document.getElementById('battle-end-controls').style.display = 'none';
    }

    function updateBattleUI() {
        const p = currentBattle.player;
        const e = currentBattle.enemy;

        const pPct = (p.hp / p.maxHp) * 100;
        const ePct = (e.hp / e.maxHp) * 100;

        document.getElementById('player-hp-bar').style.width = `${Math.max(0, pPct)}%`;
        document.getElementById('player-hp-text').textContent = `${Math.max(0, p.hp)}/${p.maxHp}`;
        
        document.getElementById('enemy-hp-bar').style.width = `${Math.max(0, ePct)}%`;
        document.getElementById('enemy-hp-text').textContent = `${Math.max(0, e.hp)}/${e.maxHp}`;
    }

    function logBattle(msg, type) {
        const log = document.getElementById('battle-log');
        const div = document.createElement('div');
        div.className = `log-entry log-${type}`;
        div.textContent = msg;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    function battleAttack() {
        if (!currentBattle) return;

        // Player Turn
        const dmg = currentBattle.player.dmg + Math.floor(Math.random() * 5);
        currentBattle.enemy.hp -= dmg;
        logBattle(`Вы нанесли ${dmg} урона!`, 'player');
        
        if (currentBattle.enemy.hp <= 0) {
            endBattle(false, true);
            return;
        }

        updateBattleUI();

        // Enemy Turn (delayed)
        setTimeout(() => {
            if (!currentBattle) return;
            const enemyDmg = Math.max(1, currentBattle.enemy.dmg - Math.floor(currentBattle.player.stats?.exp / 10)); // Exp reduces dmg slightly
            currentBattle.player.hp -= enemyDmg;
            logBattle(`${currentBattle.enemy.name} нанес ${enemyDmg} урона!`, 'enemy');
            
            if (currentBattle.player.hp <= 0) {
                endBattle(false, false);
            } else {
                updateBattleUI();
            }
        }, 600);
    }

    function endBattle(abandoned, won = false) {
        document.getElementById('battle-screen').style.display = 'none';
        
        if (won) {
            const rewardGold = 20 + Math.floor(Math.random() * 10);
            state.gold += rewardGold;
            state.rating += 10;
            showNotification(`Победа! Получено ${rewardGold} золота`);
            checkQuestProgress('battle');
            checkQuestProgress('gold_check');
        } else if (!abandoned) {
            showNotification("Поражение! Попробуйте улучшить героя.");
        }

        currentBattle = null;
        saveState();
    }

    // Start
    init();

</script>
</body>
</html>
